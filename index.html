<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shetu Multi -Printing Group | Printings Hub</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0f172a;color:#fff;text-align:center}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:#1e293b;position:sticky;top:0;z-index:1000;
}

.logo{display:flex;align-items:center;gap:10px;font-weight:bold;}
.logo img{width:45px;height:45px;border-radius:50%}

/* MENU */
nav a{color:#fff;text-decoration:none;margin:0 10px;}
nav a:hover{color:#22d3ee}
.hamburger{display:none;font-size:26px;cursor:pointer;}

/* HERO */
.hero{
background:url("poster.jpg") center/cover no-repeat;
padding:100px 20px;position:relative;
}
.hero::after{
content:"";position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);
}
.hero h1,.hero p{position:relative;z-index:1;}

/* CONTAINER */
.container{max-width:1000px;margin:auto;padding:20px}

/* CARD */
.card{background:#1e293b;padding:20px;border-radius:12px;margin:20px auto}

/* INPUT */
input,select{
width:90%;padding:10px;margin:8px auto;border-radius:8px;border:none;
display:block;
}

/* FILE UPLOAD */
.fileUpload{
border:2px dashed #22d3ee;
padding:15px;
border-radius:10px;
cursor:pointer;
margin:12px auto;
width:90%;
display:block;
}

/* BUTTON */
button{
padding:10px;border:none;border-radius:8px;
background:#22d3ee;cursor:pointer;font-weight:bold;margin:6px;
}

/* MODAL */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);justify-content:center;align-items:center;
z-index:2000;
}

.modal-content{
background:#1e293b;
padding:20px;
border-radius:12px;
width:95%;
max-width:900px;
max-height:90vh;
overflow-y:auto;
}

/* FOOTER */
footer{
background:#1e293b;
margin-top:30px;
padding:20px;
color:#ccc;
}

/* MOBILE */
@media(max-width:768px){
nav{display:none;flex-direction:column;background:#1e293b;
position:absolute;top:60px;right:10px;padding:10px;border-radius:10px;}
nav.active{display:flex}
.hamburger{display:block}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="shetu logo-01.jpg"> Printing Group Cc 
</div>
<div class="hamburger" onclick="toggleMenu()">☰</div>
<nav id="menu">
<a href="#home">🏠 Home</a>
<a href="#print">🖨 Print</a>
<a href="#" onclick="openTrack()">📦 Track</a>
<a href="#" onclick="openAdmin()">📊 Admin</a>
</nav>
</header>

<section class="hero" id="home">
<h1>WELCOME</h1>
<p>Printing • Design • Branding • Namibia</p>
</section>

<div class="container">

<div class="card" id="print">
<h2>🖨 Create Printing Order</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone">

<select id="payment">
<option>Cash</option>
<option>EFT</option>
<option>Pay on Delivery</option>
</select>

<select id="type" onchange="calcTotal()">
<option value="1">Black & White (N$1)</option>
<option value="5">Color (N$5)</option>
</select>

<input id="copies" type="number" value="1" oninput="calcTotal()">

<label class="fileUpload">
📂 Upload File
<input type="file" id="file" hidden>
</label>

<h3>Total: N$<span id="total">1</span></h3>

<button onclick="saveOrder()">💾 Save Order</button>
<button onclick="continueOrder()">🚀 Submit Order</button>

</div>

</div>

<!-- TRACK MODAL -->
<div id="trackModal" class="modal">
<div class="modal-content">
<h2>📦 Track Order</h2>

<input id="trackPhone" placeholder="Enter phone">
<button onclick="trackOrder()">Check</button>

<div id="trackResult"></div>

<button onclick="closeTrack()">Close</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="modal">
<div class="modal-content">

<h3>📊 Admin Dashboard</h3>

<input id="search" oninput="render()" placeholder="Search orders...">

<div id="orders"></div>

<button onclick="closeAdmin()">Close</button>
</div>
</div>

<footer>
<p>© Shetu Multi Group | Windhoek Namibia</p>
<p>📧 orders2shetu@gmail.com</p>
<p>📷 Instagram: @shetu_group</p>
</footer>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");

const total=document.getElementById("total");

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* TRACK */
function openTrack(){trackModal.style.display="flex";}
function closeTrack(){trackModal.style.display="none";}

/* CALC */
function calcTotal(){
total.innerText=Number(copies.value)*Number(type.value);
}

/* FILE BASE64 */
function getFileBase64(file){
return new Promise((res)=>{
let reader=new FileReader();
reader.onload=()=>res(reader.result);
reader.readAsDataURL(file);
});
}

/* ✅ FIXED VALIDATION FUNCTION */
function isValidInput(){
let nameVal = name.value.trim();
let phoneVal = phone.value.trim();

if(nameVal === "" || phoneVal === ""){
alert("⚠️ Please fill in all required fields correctly");
return false;
}

return true;
}

/* SAVE ORDER */
async function saveOrder(){

if(!isValidInput()) return;

let fileData="";
let f=file.files[0];
if(f){fileData=await getFileBase64(f);}

let order={
id:"SG"+Date.now(),
name:name.value.trim(),
phone:phone.value.trim(),
price:Number(copies.value)*Number(type.value),
file:fileData,
status:"Saved"
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

alert("✅ Order Saved");
render();
}

/* 🚀 FIXED SUBMIT ORDER */
async function continueOrder(){

if(!isValidInput()) return;

let fileData="";
let f=file.files[0];
if(f){fileData=await getFileBase64(f);}

let order={
id:"SG"+Date.now(),
name:name.value.trim(),
phone:phone.value.trim(),
price:Number(copies.value)*Number(type.value),
file:fileData,
status:"Pending"
};

orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

/* ONLY opens if valid */
window.open(`https://wa.me/264813353232?text=NEW ORDER%0A${order.name}%0A${order.phone}%0A${order.price}`);

render();
}

/* TRACK */
function trackOrder(){
let results=orders.filter(o=>o.phone.includes(trackPhone.value));
trackResult.innerHTML=results.length?results.map(o=>`
<div class="card">
<b>${o.id}</b><br>${o.name}<br>${o.status}<br>N$${o.price}
</div>`).join(""):"❌ No orders";
}

/* ADMIN */
function openAdmin(){
if(prompt("Admin Password")==="1234"){
adminModal.style.display="flex";render();
}
}
function closeAdmin(){adminModal.style.display="none";}

/* RENDER */
function render(){
ordersDiv.innerHTML="";
orders.forEach((o,i)=>{

ordersDiv.innerHTML+=`
<div class="card">
<b>${o.name}</b><br>
${o.phone}<br>
N$${o.price}<br>

<select onchange="status(${i},this.value)">
<option ${o.status=="Saved"?"selected":""}>Saved</option>
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Delivered"?"selected":""}>Delivered</option>
<option ${o.status=="Completed"?"selected":""}>Completed</option>
</select>

${o.file ? `<a href="${o.file}" download="file_${o.id}">📥 File</a>`:""}

<button onclick="downloadFilePDF(${i})">📄 File PDF</button>
<button onclick="sendWhatsApp(${i})">📱 WhatsApp</button>
<button onclick="invoice(${i})">🧾 Invoice</button>
<button onclick="deleteOrder(${i})">🗑 Delete</button>
</div>
`;
});
}

/* DOWNLOAD FILE PDF */
function downloadFilePDF(i){
let o=orders[i];
if(!o.file){alert("No file");return;}

let el=document.createElement("div");
el.innerHTML=`<img src="${o.file}" style="width:100%">`;
html2pdf().from(el).save("file.pdf");
}

/* WHATSAPP */
function sendWhatsApp(i){
let o=orders[i];
window.open(`https://wa.me/${o.phone}?text=Order Update%0A${o.name}%0A${o.status}`);
}

/* STATUS */
function status(i,v){
orders[i].status=v;
localStorage.setItem("orders",JSON.stringify(orders));
render();
}

/* DELETE */
function deleteOrder(i){
orders.splice(i,1);
localStorage.setItem("orders",JSON.stringify(orders));
render();
}

/* INVOICE */
function invoice(i){
let o=orders[i];
let el=document.createElement("div");
el.innerHTML=`<h2>Invoice</h2><p>${o.name}</p><p>${o.phone}</p><p>N$${o.price}</p>`;
html2pdf().from(el).save("invoice.pdf");
}

render();
calcTotal();

</script>

<script>
const ordersDiv=document.getElementById("orders");
</script>

</body>
</html>
